<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haru Team | Probably Works</title>
    <link
        rel="icon"
        type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231E2022'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' font-family='Nunito,Arial,sans-serif' font-size='34' font-weight='900' fill='%2389A0AE'%3EH%3C/text%3E%3C/svg%3E"
    >
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome (Includes GitHub Icon) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* 
         * DESIGN SYSTEM & VARIABLES 
         * Nordic Slate Palette & Theming 
         */
        :root {
            /* Colors - Dark Mode (Default) */
            --bg-primary: #1E2022;       /* Near-Black */
            --bg-secondary: #2B2E31;     /* Slightly lighter black */
            --text-primary: #F0F5F9;     /* Ice Gray */
            --text-secondary: #C9D6DF;   /* Cool Steel */
            --accent: #52616B;           /* Slate */
            --highlight: #89A0AE;        /* Lighter Slate */
            
            /* UI Elements */
            --card-bg: rgba(43, 46, 49, 0.7);
            --nav-bg: rgba(30, 32, 34, 0.95);
            --cursor-color: #C9D6DF;
            
            /* Spacing & Transition */
            --border-radius: 16px;
            --transition-speed: 0.3s;
        }

        /* Light Mode Overrides */
        [data-theme="light"] {
            --bg-primary: #F0F5F9;       /* Ice Gray Background */
            --bg-secondary: #FFFFFF;
            --text-primary: #1E2022;     /* Near-Black Text */
            --text-secondary: #52616B;   /* Slate Text */
            --accent: #C9D6DF;           /* Cool Steel */
            --highlight: #52616B;
            
            --card-bg: rgba(255, 255, 255, 0.8);
            --nav-bg: rgba(240, 245, 249, 0.95);
            --cursor-color: #1E2022;
        }

        /* Global Reset & Base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: none; /* Hide default cursor for custom one */
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color var(--transition-speed), color var(--transition-speed);
            overflow-x: hidden;
            line-height: 1.6;
        }

        h1, h2, h3, h4 {
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        button {
            cursor: none; /* Ensure custom cursor works on buttons */
            border: none;
            background: none;
            font-family: inherit;
        }

        /* Custom Cursor */
        .custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 20px;
            height: 20px;
            background-color: var(--cursor-color);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
            transition: width 0.3s, height 0.3s, background-color 0.3s;
        }
        
        .custom-cursor.hovered {
            width: 50px;
            height: 50px;
            background-color: var(--highlight);
            mix-blend-mode: normal;
            opacity: 0.5;
        }

        @media (hover: none) and (pointer: coarse) {
            .custom-cursor { display: none; }
            * { cursor: auto; }
            button { cursor: pointer; }
        }

        /* Utilities */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .fade-in-section {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
        
        .fade-in-section.is-visible {
            opacity: 1;
            transform: none;
        }

        /* Hero Animation */
        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 10s infinite ease-in-out;
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: var(--accent);
            animation-delay: 0s;
        }

        .blob-2 {
            bottom: 10%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: var(--highlight);
            animation-delay: 2s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* Navigation */
        .nav-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: var(--bg-primary);
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            transform: translateY(-100%);
            transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .nav-overlay.open {
            transform: translateY(0);
        }

        .nav-link {
            font-size: 2.5rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            color: var(--text-secondary);
            transition: color 0.3s;
        }

        .nav-link:hover {
            color: var(--highlight);
        }

        /* Cards */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: var(--border-radius);
            padding: 2rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-color: var(--accent);
        }

        /* Theme Toggle */
        .theme-toggle {
            width: 50px;
            height: 26px;
            background: var(--accent);
            border-radius: 50px;
            position: relative;
            transition: background 0.3s;
        }

        .theme-toggle::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.3s;
        }

        [data-theme="light"] .theme-toggle::after {
            transform: translateX(24px);
        }

        /* Back to top */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--highlight);
            color: var(--bg-primary);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 40;
        }

        .back-to-top.visible {
            opacity: 1;
            pointer-events: all;
        }

        .back-to-top:hover {
            transform: scale(1.1);
        }

        /* Social Icon Styles */
        .social-icon {
            color: var(--text-secondary);
            font-size: 1.25rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        
        .social-icon:hover {
            color: var(--highlight);
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const CONTACT_EMAIL = window.HARU_CONTACT_EMAIL || "contact@haru.team";
        const GITHUB_PROFILE_URL = window.HARU_GITHUB_PROFILE_URL || "https://github.com/UDTudtXD";

        // --- Data ---
        const TEAM_MEMBERS = [
            { id: 1, name: "felzeth", role: "Founder, Lead Developer", img: "https://avatars.githubusercontent.com/u/186721866?v=4", twitter: "@UDTudtXD", github: "UDTudtXD" },           
            { id: 2, name: "𝕊ℕ𝔸ℙ𝕏Øℕ", role: "Associated", img: "https://pbs.twimg.com/profile_images/2022701151846830080/-BRHKrFy_400x400.jpg", twitter: "@Terrenxels" },
            { id: 3, name: "Panaz", role: "Kale Master", img: "https://i.pinimg.com/736x/62/93/55/629355692929a33702635ea42cc871f2.jpg" },
            { id: 4, name: "Satan", role: "Teehid", img: "https://i.pinimg.com/736x/fd/68/c4/fd68c409363d69aa78154e572a22be96.jpg" },
        ];

        const SERVICES = [
            { id: 1, title: "Chaos Engineering", icon: "fa-pen-nib", desc: "We skip testing. Production is the test." },
            { id: 2, title: "Production Testing", icon: "fa-code", desc: "Our bug fixes come with bonus bugs." },
            { id: 3, title: "Team Culture", icon: "fa-wand-magic-sparkles", desc: "Move fast. Break things. Blame the intern. Vibe code." },
        ];

        const PRODUCTS = [
            {
                id: 1,
                name: "Haru Index",
                status: "Active",
                desc: "Our main project focused on building and organizing Haru Team web experiences.",
                stack: ["React", "Tailwind CSS", "JavaScript"],
                link: "https://github.com/UDTudtXD"
            }
        ];

        // --- Components ---

        // Custom Cursor Component
        const CustomCursor = () => {
            const cursorRef = useRef(null);

            useEffect(() => {
                const cursor = cursorRef.current;
                const moveCursor = (e) => {
                    cursor.style.left = `${e.clientX}px`;
                    cursor.style.top = `${e.clientY}px`;
                };

                const addHover = () => cursor.classList.add('hovered');
                const removeHover = () => cursor.classList.remove('hovered');

                document.addEventListener('mousemove', moveCursor);
                
                const interactives = document.querySelectorAll('a, button, .card');
                interactives.forEach(el => {
                    el.addEventListener('mouseenter', addHover);
                    el.addEventListener('mouseleave', removeHover);
                });

                return () => {
                    document.removeEventListener('mousemove', moveCursor);
                    interactives.forEach(el => {
                        el.removeEventListener('mouseenter', addHover);
                        el.removeEventListener('mouseleave', removeHover);
                    });
                };
            }, []);

            return <div ref={cursorRef} className="custom-cursor"></div>;
        };

        // Scroll Fade In Hook
        const useOnScreen = (options) => {
            const ref = useRef(null);
            const [isVisible, setIsVisible] = useState(false);

            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) {
                        setIsVisible(true);
                        observer.disconnect();
                    }
                }, options);

                if (ref.current) observer.observe(ref.current);
                return () => { if (ref.current) observer.unobserve(ref.current); };
            }, [ref, options]);

            return [ref, isVisible];
        };

        const FadeIn = ({ children, delay = 0 }) => {
            const [ref, isVisible] = useOnScreen({ threshold: 0.1 });
            return (
                <div 
                    ref={ref} 
                    className={`fade-in-section ${isVisible ? 'is-visible' : ''}`}
                    style={{ transitionDelay: `${delay}ms` }}
                >
                    {children}
                </div>
            );
        };

        // Navigation
        const Navbar = ({ setView, isDark, toggleTheme }) => {
            const [isOpen, setIsOpen] = useState(false);

            const handleNav = (viewName) => {
                setView(viewName);
                setIsOpen(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <>
                    <nav className="fixed top-0 left-0 w-full z-50 px-6 py-4 flex justify-between items-center mix-blend-difference text-white">
                        <div className="text-2xl font-bold tracking-tighter" onClick={() => handleNav('home')} style={{cursor: 'none'}}>
                            HARU<span className="text-blue-300">.</span>
                        </div>
                        
                        <div className="flex items-center gap-6">
                            <div onClick={toggleTheme} className="theme-toggle hover-trigger"></div>
                            
                            <button 
                                className="text-2xl focus:outline-none z-50 relative"
                                onClick={() => setIsOpen(!isOpen)}
                                aria-label="Toggle Menu"
                            >
                                <i className={`fas ${isOpen ? 'fa-times' : 'fa-bars'}`}></i>
                            </button>
                        </div>
                    </nav>

                    <div className={`nav-overlay ${isOpen ? 'open' : ''}`}>
                        <button onClick={() => handleNav('home')} className="nav-link">Home</button>
                        <button onClick={() => handleNav('team')} className="nav-link">Team</button>
                        <button onClick={() => handleNav('services')} className="nav-link">Services</button>
                        <button onClick={() => handleNav('product')} className="nav-link">Product</button>
                        <button onClick={() => handleNav('contact')} className="nav-link">Contact</button>
                    </div>
                </>
            );
        };

        // Pages
        const Home = ({ setView }) => (
            <div className="min-h-screen flex flex-col justify-center items-center relative px-4 pt-20">
                <div className="hero-bg">
                    <div className="blob blob-1"></div>
                    <div className="blob blob-2"></div>
                </div>

                <FadeIn>
                    <h1 className="text-5xl md:text-8xl font-black mb-6 text-center leading-tight">
                        We Are <br />
                        <span style={{color: 'var(--highlight)'}}>Haru Team</span>
                    </h1>
                </FadeIn>
                
                <FadeIn delay={200}>
                    <p className="text-xl md:text-2xl text-center max-w-2xl mb-10 text-[var(--text-secondary)]">
                       A group of developers building things that mostly work.
                        When they don't, we call it a feature.
                    </p>
                </FadeIn>

                <FadeIn delay={400}>
                    <div className="flex gap-4">
                        <button 
                            onClick={() => setView('team')}
                            className="px-8 py-4 bg-[var(--highlight)] text-[var(--bg-primary)] font-bold rounded-full hover:bg-white transition-colors text-lg"
                        >
                            Meet the Crew
                        </button>
                        <button 
                            onClick={() => setView('contact')}
                            className="px-8 py-4 border-2 border-[var(--text-secondary)] text-[var(--text-primary)] font-bold rounded-full hover:bg-[var(--text-secondary)] hover:text-[var(--bg-primary)] transition-colors text-lg"
                        >
                            Say Hello
                        </button>
                        <button 
                            onClick={() => setView('product')}
                            className="px-8 py-4 border-2 border-[var(--highlight)] text-[var(--text-primary)] font-bold rounded-full hover:bg-[var(--highlight)] hover:text-[var(--bg-primary)] transition-colors text-lg"
                        >
                            View Projects
                        </button>
                    </div>
                </FadeIn>

                <FadeIn delay={600}>
                    <div className="absolute bottom-10 animate-bounce">
                        <i className="fas fa-chevron-down text-2xl text-[var(--text-secondary)]"></i>
                    </div>
                </FadeIn>
            </div>
        );

        const Team = () => (
            <div className="container mx-auto px-4 py-32 min-h-screen">
                <FadeIn>
                    <h2 className="text-4xl md:text-6xl font-bold mb-16 text-center">Our <span style={{color: 'var(--highlight)'}}>Members</span></h2>
                </FadeIn>
                
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                    {TEAM_MEMBERS.map((member, idx) => (
                        <FadeIn key={member.id} delay={idx * 100}>
                            <div className="card text-center group">
                                <div className="w-32 h-32 mx-auto mb-6 rounded-full overflow-hidden border-4 border-[var(--accent)] group-hover:border-[var(--highlight)] transition-colors">
                                    <img src={member.img} alt={member.name} className="w-full h-full object-cover" />
                                </div>
                                <h3 className="text-2xl font-bold mb-2">{member.name}</h3>
                                <p className="text-[var(--text-secondary)] mb-4 font-mono">{member.role}</p>
                                
                                {/* Social Links Area */}
                                {(member.twitter || member.github) && (
                                    <div className="flex justify-center gap-6">
                                        {member.twitter && (
                                            <a 
                                                href={`https://twitter.com/${member.twitter.replace('@', '')}`} 
                                                target="_blank" 
                                                rel="noreferrer" 
                                                className="social-icon"
                                                aria-label={`${member.name} Twitter`}
                                            >
                                                <i className="fab fa-twitter text-xl"></i>
                                            </a>
                                        )}
                                        {member.github && (
                                            <a 
                                                href={`https://github.com/${member.github}`} 
                                                target="_blank" 
                                                rel="noreferrer" 
                                                className="social-icon"
                                                aria-label={`${member.name} GitHub`}
                                            >
                                                <i className="fab fa-github text-xl"></i>
                                            </a>
                                        )}
                                    </div>
                                )}
                            </div>
                        </FadeIn>
                    ))}
                </div>
            </div>
        );

        const Services = () => (
            <div className="container mx-auto px-4 py-32 min-h-screen">
                <FadeIn>
                    <h2 className="text-4xl md:text-6xl font-bold mb-16 text-center">What We <span style={{color: 'var(--highlight)'}}>Do</span></h2>
                </FadeIn>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                    {SERVICES.map((service, idx) => (
                        <FadeIn key={service.id} delay={idx * 150}>
                            <div className="card h-full flex flex-col">
                                <div className="text-4xl text-[var(--highlight)] mb-6">
                                    <i className={`fas ${service.icon}`}></i>
                                </div>
                                <h3 className="text-2xl font-bold mb-4">{service.title}</h3>
                                <p className="text-[var(--text-secondary)] flex-grow">{service.desc}</p>
                            </div>
                        </FadeIn>
                    ))}
                </div>
            </div>
        );

        const Product = () => (
            <div className="container mx-auto px-4 py-32 min-h-screen">
                <FadeIn>
                    <h2 className="text-4xl md:text-6xl font-bold mb-6 text-center">Our <span style={{color: 'var(--highlight)'}}>Product</span></h2>
                </FadeIn>

                <FadeIn delay={120}>
                    <p className="text-center text-[var(--text-secondary)] text-lg max-w-2xl mx-auto mb-14">
                        This is what we are building right now.
                    </p>
                </FadeIn>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    {PRODUCTS.map((product, idx) => (
                        <FadeIn key={product.id} delay={idx * 120}>
                            <div className="card h-full flex flex-col gap-5">
                                <div className="flex items-center justify-between gap-4 flex-wrap">
                                    <h3 className="text-3xl font-bold">{product.name}</h3>
                                    <span className="px-4 py-1 rounded-full text-sm font-bold bg-[var(--accent)] text-[var(--text-primary)]">
                                        {product.status}
                                    </span>
                                </div>
                                <p className="text-[var(--text-secondary)]">{product.desc}</p>
                                <div className="flex gap-3 flex-wrap">
                                    {product.stack.map((item) => (
                                        <span key={item} className="px-3 py-1 rounded-full border border-[var(--accent)] text-sm text-[var(--text-secondary)]">
                                            {item}
                                        </span>
                                    ))}
                                </div>
                                <a
                                    href={product.link}
                                    target="_blank"
                                    rel="noreferrer"
                                    className="mt-2 inline-flex items-center gap-2 font-bold text-[var(--highlight)] hover:text-white transition-colors"
                                >
                                    <i className="fab fa-github"></i>
                                    View project
                                </a>
                            </div>
                        </FadeIn>
                    ))}
                </div>
            </div>
        );

        const Contact = () => {
            const gmailDraftUrl = `https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(CONTACT_EMAIL)}&su=${encodeURIComponent("Hello Haru!")}&body=${encodeURIComponent("Hi Haru,\n\nI'd like to....")}`;

            return (
                <div className="container mx-auto px-4 py-32 min-h-screen flex items-center justify-center">
                    <div className="w-full max-w-2xl">
                        <FadeIn>
                            <h2 className="text-4xl md:text-6xl font-bold mb-8 text-center">Let's <span style={{color: 'var(--highlight)'}}>Talk</span></h2>
                        </FadeIn>
                        
                        <FadeIn delay={200}>
                            <div className="card space-y-6">
                                <p className="text-center text-[var(--text-secondary)] text-lg">
                                    Prefer direct contact? Contact us through Gmail!,<br /> or visit my GitHub profile.
                                </p>

                                <a
                                    href={gmailDraftUrl}
                                    target="_blank"
                                    rel="noreferrer"
                                    className="w-full py-4 bg-[var(--highlight)] text-[var(--bg-primary)] font-bold rounded-lg hover:bg-white transition-colors text-lg flex items-center justify-center gap-3"
                                >
                                    <i className="fas fa-envelope"></i>
                                    Open Gmail
                                </a>

                                <a
                                    href={GITHUB_PROFILE_URL}
                                    target="_blank"
                                    rel="noreferrer"
                                    className="w-full py-4 border-2 border-[var(--text-secondary)] text-[var(--text-primary)] font-bold rounded-lg hover:bg-[var(--text-secondary)] hover:text-[var(--bg-primary)] transition-colors text-lg flex items-center justify-center gap-3"
                                >
                                    <i className="fab fa-github"></i>
                                    View GitHub Profile
                                </a>

                                <p className="text-center text-sm text-[var(--text-secondary)]">
                                    Our Email: {CONTACT_EMAIL}
                                </p>
                            </div>
                        </FadeIn>
                    </div>
                </div>
            );
        };

        const Footer = () => (
            <footer className="py-12 text-center text-[var(--text-secondary)] text-sm relative z-10 border-t border-[var(--accent)] mt-20">
                <div className="container mx-auto flex flex-col md:flex-row justify-between items-center px-4 gap-4">
                    <div>
                        <p>&copy; 2026 Haru Team. Made with <i className="fas fa-heart text-red-500"></i> and Code.</p>
                    </div>
                    
                    <div className="flex gap-6">
                        <a href="#" className="social-icon hover-trigger" aria-label="GitHub Organization">
                            <i className="fab fa-github text-xl"></i>
                        </a>
                        <a href="#" className="social-icon hover-trigger" aria-label="Twitter Organization">
                            <i className="fab fa-twitter text-xl"></i>
                        </a>
                    </div>
                </div>
            </footer>
        );

        const BackToTop = () => {
            const [isVisible, setIsVisible] = useState(false);

            useEffect(() => {
                const toggleVisibility = () => {
                    if (window.pageYOffset > 300) {
                        setIsVisible(true);
                    } else {
                        setIsVisible(false);
                    }
                };

                window.addEventListener("scroll", toggleVisibility);
                return () => window.removeEventListener("scroll", toggleVisibility);
            }, []);

            const scrollToTop = () => {
                window.scrollTo({ top: 0, behavior: "smooth" });
            };

            return (
                <button 
                    className={`back-to-top ${isVisible ? 'visible' : ''}`}
                    onClick={scrollToTop}
                    aria-label="Back to Top"
                >
                    <i className="fas fa-arrow-up"></i>
                </button>
            );
        };

        // --- Main App ---
        const App = () => {
            const [view, setView] = useState('home');
            const [isDark, setIsDark] = useState(true);

            // Theme Effect
            useEffect(() => {
                if (isDark) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                } else {
                    document.documentElement.setAttribute('data-theme', 'light');
                }
            }, [isDark]);

            const toggleTheme = () => setIsDark(!isDark);

            return (
                <div className="app">
                    <CustomCursor />
                    <Navbar setView={setView} isDark={isDark} toggleTheme={toggleTheme} />
                    
                    <main>
                        {view === 'home' && <Home setView={setView} />}
                        {view === 'team' && <Team />}
                        {view === 'services' && <Services />}
                        {view === 'product' && <Product />}
                        {view === 'contact' && <Contact />}
                    </main>

                    <Footer />
                    <BackToTop />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
